name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  tests:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.14"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y libfuse2 || sudo apt-get install -y libfuse2t64 || sudo apt-get install -y libfuse3-3

      - name: Install package
        run: |
          set -euxo pipefail
          python -m pip install --upgrade pip
          pip install -e . ruff

      - name: Ruff format
        run: |
          set -euxo pipefail
          ruff format --check .

      - name: Ruff check
        run: |
          set -euxo pipefail
          ruff check .

      - name: Run test suite
        run: |
          set -euxo pipefail
          python -m unittest tests/test_chaosfs.py
